    <section class="container mt-5">

        <div class="card p-5 shadow text-center">

            <h1 class="mb-4">
                Country Information API
            </h1>

            <button class="btn btn-dark mb-4" onclick="getCountry()">
                Bilgi Getir
            </button>

            <div id="countryResult"></div>

        </div>

    </section>

<script>

function getCountry(){

    fetch("https://restcountries.com/v3.1/name/turkey")

    .then(response => response.json())

    .then(data => {

        document.getElementById("countryResult").innerHTML = `

            <h2>${data[0].name.common}</h2>

            <p>
                Başkent: ${data[0].capital}
            </p>

            <p>
                Nüfus: ${data[0].population}
            </p>

            <img src="${data[0].flags.png}" width="200">

        `;

    })

}

</script>
