    <section class="container mt-5">

        <div class="card p-5 shadow text-center">

            <h1 class="mb-4">
                Kitap Information API
            </h1>

            <button class="btn btn-dark mb-4" onclick="getBook()">
                Kitap Getir
            </button>

            <div id="bookResult"></div>

        </div>

    </section>
    
    
    <script>
    
     function getBook(){
        
        fetch("https://openlibrary.org/search.json?q=rich+dad+poor+dad")
        
        .then(response => response.json())

        .then(data => {
            
              document.getElementById("bookResult").innerHTML = `
            
               <h3 class="mt-2 fw-light">
                  Kitap Adı:
               </h3>
            
               <h3 class="mb-2 fw-light">
                  ${data.docs[0].title}
               </h3>
            
                <h3 class="mb-2 fw-light">
                  Yazar: ${data.docs[0].author_name[0]}
               </h3>
            
               <h3 class="mb-2 fw-light">
                  Yayın Yılı: ${data.docs[0].first_publish_year}
               </h3>
            
                <img src="https://covers.openlibrary.org/b/id/${data.docs[0].cover_i}-L.jpg"
                  width="250"
                  class="rounded shadow">
            
                `;
        
            });

        }

    </script>
