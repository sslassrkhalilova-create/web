<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Menü -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                Salasar
            </a>

            <div>

                <a class="text-white me-3 text-decoration-none" href="index.html">
                    Ana Sayfa
                </a>

                <a class="text-white me-3 text-decoration-none" href="about.html">
                    Hakkımda
                </a>

                <a class="text-white me-3 text-decoration-none" href="cv.html">
                    CV
                </a>

                <a class="text-white me-3 text-decoration-none" href="city.html">
                    Şehrim
                </a>

                <a class="text-white text-decoration-none" href="contact.html">
                    İletişim
                </a>

            </div>

        </div>

    </nav>

    <!-- Form -->
    <section class="container mt-5">

        <div class="card p-4 shadow">

            <h1 class="text-center mb-4">
                İletişim Formu
            </h1>

            <form onsubmit="return validateForm()">

                <div class="mb-3">

                    <label class="form-label">
                        Ad Soyad
                    </label>

                    <input type="text" class="form-control" id="name">

                </div>

                <div class="mb-3">

                    <label class="form-label" id="email">
                        Email
                    </label>

                    <input type="email" class="form-control" >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Mesaj
                    </label>

                    <textarea class="form-control" rows="5" id="message"></textarea>

                </div>

                <button class="btn btn-dark">
                    Gönder
                </button>

            </form>

        </div>

    </section>

<script src="validation.js"> </script>

</body>

</html>
