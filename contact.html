    <!-- Form -->
    <section class="container mt-5">

        <div class="card p-4 shadow">

            <h1 class="text-center mb-4">
                İletişim Formu
            </h1>

            <form onsubmit="return validateForm()" id="app">

                <div class="mb-3">

                    <label class="form-label">
                        Ad Soyad
                    </label>

                    <input type="text" class="form-control" id="name">

                </div>
                
                <div class="mb-3">
                    
                    <label class="form-label">
                        Telefon
                    </label>
                    
                    <input type="text" class="form-control" id="phone">
                
                </div>

                <div class="mb-3">

                    <label class="form-label" id="email">
                        Email
                    </label>

                    <input type="email" class="form-control" id="email">

                </div>
                
                <div class="mb-3">
                    <label class="form-label d-block">
                        Cinsiyet
                    </label>
                    
                    <input type="radio" name="gender"> Kadın
                    
                    <input type="radio" name="gender" class="ms-3"> Erkek
                
                </div>
                
                <div class="mb-3">
                    <label class="form-label d-block">
                        İlgi Alanları
                    </label>
                    
                    <input type="checkbox"> Tasarım

                    <input type="checkbox" class="ms-3"> Spor
                
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        Şehir Seçiniz
                    </label>
                    
                    <select class="form-select">
                        <option>İstanbul</option>
                        <option>Ankara</option>
                        <option>Sakarya</option>
                        <option>Bursa</option>
                        <option>izmir</option>
                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Mesaj
                    </label>

                    <textarea class="form-control" rows="5" id="message"></textarea>

                </div>

                <div class="d-flex gap-3 mt-3">

                <button class="btn btn-dark px-4">
                    Gönder
                </button>

                <button type="button"
                class="btn btn-success px-4"
                @click="vueControl">

                  Vue Kontrol

                </button>

                </div>

            </form>

        </div>

    </section>

<script src="validation.js"> </script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
